# KRUD Shop Configuration
# Author: Krud Studio
# Description: Krud Studio Khmer
# Supports: Bukkit/Spigot/Paper/Purpur/Folia 1.21.x
# NO license key required

messages:
  prefix: "<gradient:#a855f7:#f59e0b><bold>[ᴋʀᴜᴅ ꜱʜᴏᴘ]</bold></gradient>"
  no-permission: "<red>✘ No permission!"
  reloaded: "<green>✔ Config and categories reloaded!"
  no-money: "<red>✘ Insufficient funds!"
  purchase-success: "<green>✔ Purchased <white>{amount}x {item}</white> for <green>${price}!"
  inventory-full: "<red>✘ Inventory is full!"
  separator: "<#7c3aed>⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯⎯"

items:
  filler:
    material: GRAY_STAINED_GLASS_PANE
    name: " "
  back-page:
    material: ARROW
    name: "<gray>← Previous Page"
  next-page:
    material: ARROW
    name: "<gray>Next Page →"
  back-to-main:
    material: BARRIER
    name: "<red>← Back to Main Menu"
  confirm:
    material: LIME_STAINED_GLASS_PANE
    name: "<green><bold>✔ Confirm Purchase"
  cancel:
    material: RED_STAINED_GLASS_PANE
    name: "<red><bold>✘ Cancel"

